
quarkus.rest-client.nasa-api-base-url.url=${NASA_BASE_URL}
quarkus.rest-client.nasa-api-base-url.read-timeout=60000
quarkus.rest-client.nasa-api-base-url.connect-timeout=30000

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/postgres
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
#quarkus.hibernate-orm.dev-services.enabled=true
quarkus.hibernate-orm.sql-load-script=no-file

%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true

#update should be used only in development, for production consider using 'validate' or 'none'
# and manage schema changes with migrations
quarkus.hibernate-orm.schema-management.strategy=update

quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:8080
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
