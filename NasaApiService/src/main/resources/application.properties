# ==========================================
# ? LOCAL DEVELOPMENT ENVIRONMENT (Default)
# ==========================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.driver=org.postgresql.Driver

# Local machine database targets
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/postgres
quarkus.datasource.username=postgres
quarkus.datasource.password=${DB_PASSWORD}

# ==========================================
# ? GOOGLE CLOUD RUN PRODUCTION ENVIRONMENT
# ==========================================
# The "%prod." prefix tells Quarkus to ONLY read these lines when running in the cloud
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.driver=org.postgresql.Driver

# In production, pull the environment variable directly with NO fallbacks
%prod.quarkus.datasource.jdbc.url=${DB_JDBC_URL}

# Leave these empty so the IAM Socket Factory handles the credentials
%prod.quarkus.datasource.username=
%prod.quarkus.datasource.password=
%prod.quarkus.datasource.jdbc.max-size=5

# ==========================================
# ? GLOBAL CONFIGURATIONS
# ==========================================
quarkus.datasource.jdbc=true
quarkus.datasource.reactive=false

quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization